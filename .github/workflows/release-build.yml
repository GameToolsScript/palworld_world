name: release-build

on:
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:
    inputs:
      platform:
        description: 选择需要构建的平台
        required: true
        default: both
        type: choice
        options:
          - windows
          - linux
          - both

permissions:
  contents: write

jobs:
  build-windows:
    if: >-
      github.event_name == 'release' ||
      github.event.inputs.platform == 'windows' ||
      github.event.inputs.platform == 'both'

    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tools/requirements-build.txt

      - name: 执行 Windows 打包
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          pwsh -ExecutionPolicy Bypass -File .\scripts\build.ps1

      - name: 生成 Windows 发布压缩包
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = if ("${{ github.event_name }}" -eq "release") { "${{ github.event.release.tag_name }}" } else { "${{ github.run_number }}" }
          $artifactName = "palworld-save-analysis-$version-win32-x64.zip"
          $artifactPath = Join-Path $env:RUNNER_TEMP $artifactName
          if (Test-Path $artifactPath) {
            Remove-Item $artifactPath -Force
          }
          Compress-Archive `
            -Path ".\dist\win32-x64\*" `
            -DestinationPath $artifactPath `
            -Force
          "ARTIFACT_NAME=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ARTIFACT_PATH=$artifactPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 上传到 Release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ github.event.release.tag_name }}" "$ARTIFACT_PATH" --clobber

      - name: 上传工作流产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  build-linux:
    if: >-
      github.event_name == 'release' ||
      github.event.inputs.platform == 'linux' ||
      github.event.inputs.platform == 'both'

    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tools/requirements-build.txt

      - name: 执行 Linux 打包
        shell: bash
        env:
          EXTRA_PIP_PACKAGES: git+https://github.com/MRHRTZ/pyooz.git
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: 生成 Linux 发布压缩包
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
          else
            version="${{ github.run_number }}"
          fi
          artifact_name="palworld-save-analysis-${version}-linux-x86_64.tar.gz"
          artifact_path="$RUNNER_TEMP/$artifact_name"
          tar -C "./dist/linux-x86_64" -czf "$artifact_path" .
          {
            echo "ARTIFACT_NAME=$artifact_name"
            echo "ARTIFACT_PATH=$artifact_path"
          } >> "$GITHUB_ENV"

      - name: 上传到 Release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ github.event.release.tag_name }}" "$ARTIFACT_PATH" --clobber

      - name: 上传工作流产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
